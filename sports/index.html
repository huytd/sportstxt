<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>sportstxt - MLB Scoreboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light theme variables by default */
            --term-bg: #f4f5f8;
            --term-container-bg: #ffffff;
            --term-border: #e1e3ec;
            --term-green: #0d6b38;
            --term-yellow: #a27b00;
            --term-red: #c62828;
            --term-cyan: #007791;
            --term-blue: #1565c0;
            --term-magenta: #8e24aa;
            --term-gray: #6b7280;
            --term-link-hover: #000000;
            --color-primary: var(--term-green);
            --term-highlight-bg: rgba(13, 107, 56, 0.12);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* Dark theme overrides */
                --term-bg: #07080c;
                --term-container-bg: #07080c;
                --term-border: #1f222e;
                --term-green: #39ff14;
                --term-yellow: #ffeb3b;
                --term-red: #ff3b30;
                --term-cyan: #00f0ff;
                --term-blue: #3b82f6;
                --term-magenta: #d946ef;
                --term-gray: #555866;
                --term-link-hover: #ffffff;
                --term-highlight-bg: rgba(57, 255, 20, 0.18);
            }
        }

        body {
            background-color: var(--term-bg);
            color: var(--color-primary);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .term-container {
            width: 100%;
            max-width: 770px;
            background: var(--term-container-bg);
            border: 1px solid var(--term-border);
            border-radius: 8px;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .term-content {
            font-family: inherit;
            font-size: 15px;
            line-height: 1.6;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        /* Monospace text / ASCII-art blocks retain the terminal look */
        .term-art {
            margin: 0 0 12px 0;
            font-family: inherit;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            position: relative;
            overflow-x: auto;
            --scrollbar-thumb: var(--term-border);
            --scrollbar-track: transparent;
            scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
            scrollbar-width: thin;
        }

        .term-art:last-child {
            margin-bottom: 0;
        }

        /* Legacy fallback for WebKit/Blink browsers */
        @supports not (scrollbar-color: auto) {
            .term-art::-webkit-scrollbar {
                height: 6px;
            }
            .term-art::-webkit-scrollbar-thumb {
                background: var(--scrollbar-thumb);
                border-radius: 3px;
            }
            .term-art::-webkit-scrollbar-track {
                background: var(--scrollbar-track);
            }
        }

        /* Semantic tables that mimic the fixed-width terminal layout */
        table.term-table {
            border-collapse: collapse;
            width: auto;
            margin: 0 0 12px 0;
            font-family: inherit;
            font-size: 15px;
            line-height: 1.6;
            color: var(--color-primary);
            border: 1px solid var(--term-border);
        }

        table.term-table caption {
            caption-side: top;
            text-align: left;
            font-weight: bold;
            color: var(--term-cyan);
            padding: 0 0 4px 0;
        }

        table.term-table th,
        table.term-table td {
            border: 1px solid var(--term-border);
            padding: 2px 10px;
            text-align: left;
            white-space: nowrap;
            vertical-align: top;
        }

        table.term-table th {
            font-weight: bold;
        }

        table.term-table td.num,
        table.term-table th.num {
            text-align: right;
        }

        table.term-table tbody tr:hover {
            background-color: var(--term-highlight-bg);
        }

        /* Compact game summary boxes on the scoreboard */
        table.game-box {
            border: 1px solid var(--term-cyan);
            margin: 0;
        }
        table.game-box th,
        table.game-box td {
            border: none;
            padding: 1px 10px;
            white-space: nowrap;
        }
        table.game-box thead th {
            text-align: center;
            border-bottom: 1px solid var(--term-cyan);
        }

        /* Colored spans rendered by Go backend */
        .term-green { color: var(--term-green); }
        .term-yellow { color: var(--term-yellow); }
        .term-red { color: var(--term-red); }
        .term-cyan { color: var(--term-cyan); }
        .term-blue { color: var(--term-blue); }
        .term-magenta { color: var(--term-magenta); }
        .term-gray { color: var(--term-gray); }
        .term-bold { font-weight: bold; }
        .term-highlight-better {
            background-color: var(--term-highlight-bg);
            padding: 1px 4px;
            border-radius: 3px;
        }

        /* Links styling */
        .term-link {
            color: var(--color-primary);
            text-decoration: underline;
            cursor: pointer;
            font-weight: bold;
            transition: color 0.2s ease;
        }
        .term-link:hover {
            color: var(--term-link-hover) !important;
        }
        .term-box-link {
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            display: block;
        }

        /* 2-column grid for game boxes */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 16px;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        /* Status bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--term-border);
            padding-bottom: 10px;
            font-size: 12px;
            color: var(--term-gray);
            transition: border-color 0.3s ease, color 0.3s ease;
        }

        .status-bar span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot-pulse {
            width: 8px;
            height: 8px;
            background-color: var(--term-green);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
            transition: background-color 0.3s ease;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            70% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        /* Responsive design queries for mobile / smaller viewports */
        @media (max-width: 768px) {
            body {
                padding: 12px;
                justify-content: flex-start;
            }
            .term-container {
                padding: 16px;
                border-radius: 6px;
            }
            .term-art, .term-content {
                font-size: 13px;
            }
            .status-bar {
                font-size: 10px;
                margin-bottom: 12px;
                padding-bottom: 8px;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 8px;
            }
            .term-container {
                padding: 12px;
                border-radius: 4px;
            }
            .term-art, .term-content {
                font-size: 11px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 6px;
            }
            .term-container {
                padding: 10px;
            }
            .term-art, .term-content {
                font-size: 9.5px;
            }
            .status-bar {
                font-size: 9px;
            }
        }

        @media (max-width: 380px) {
            .term-art, .term-content {
                font-size: 8.5px;
            }
        }
    </style>
</head>
<body>
    <div class="term-container">
        <!-- Navigation Bar -->
        <nav style="display: flex; gap: 12px; margin-bottom: 15px;">
            <a href="/" class="term-link" style="padding: 6px 14px; border-radius: 4px;">MLB</a>
            <a href="/basketball" class="term-link" style="padding: 6px 14px; border-radius: 4px;">Basketball</a>
            <a href="/tennis" class="term-link" style="padding: 6px 14px; border-radius: 4px;">Tennis</a>
        </nav>

        <div class="status-bar">
            <span id="status-left"><span class="dot-pulse"></span>LIVE FEED</span>
            <span id="status-right">SYS TIME: --:--:--</span>
        </div>
        <div id="terminal-content" class="term-content">LOADING SCOREBOARD...</div>
    </div>

    <script>
        // Update clock and status layout
        function updateStatus() {
            const now = new Date();
            const timeStr = now.toTimeString().split(' ')[0];
            const isGamePage = window.location.pathname.startsWith('/game/');
            const isNBAGamePage = window.location.pathname.startsWith('/nba/game/');
            const isBasketballGamePage = window.location.pathname.startsWith('/basketball/game/');
            const isTennisGamePage = window.location.pathname.startsWith('/tennis/game/');

            const leftEl = document.getElementById('status-left');
            const rightEl = document.getElementById('status-right');

            if (isGamePage || isNBAGamePage || isBasketballGamePage || isTennisGamePage) {
                if (!leftEl.querySelector('a')) {
                    let backUrl = '/';
                    if (isNBAGamePage) backUrl = '/nba';
                    else if (isBasketballGamePage) backUrl = '/basketball';
                    else if (isTennisGamePage) backUrl = '/tennis';
                    leftEl.innerHTML = '<a href="' + backUrl + '" class="term-link">&lt;&lt; BACK TO SCOREBOARD</a>';
                }
                rightEl.innerHTML = '<span class="dot-pulse"></span>LIVE FEED &bull; SYS TIME: ' + timeStr;
            } else {
                if (leftEl.querySelector('a') || leftEl.innerHTML === '') {
                    leftEl.innerHTML = '<span class="dot-pulse"></span>LIVE FEED';
                }
                rightEl.innerHTML = 'SYS TIME: ' + timeStr;
            }
        }
        updateStatus();
        setInterval(updateStatus, 1000);

        let pollInterval = null;

        function updatePolling() {
            const path = window.location.pathname;
            const isTeamPage = path.startsWith('/mlb/team/');
            const isComparePage = path.startsWith('/mlb/compare');

            if (isTeamPage || isComparePage) {
                if (pollInterval) {
                    clearInterval(pollInterval);
                    pollInterval = null;
                }
            } else {
                if (!pollInterval) {
                    pollInterval = setInterval(fetchTerminalData, 10000);
                }
            }
        }

        // Fetch live terminal data
        async function fetchTerminalData() {
            try {
                const url = new URL(window.location.href);
                url.searchParams.set('raw', '1');
                if (!url.searchParams.has('tz')) {
                    url.searchParams.set('tz', Intl.DateTimeFormat().resolvedOptions().timeZone);
                }
                
                const res = await fetch(url.toString());
                if (!res.ok) throw new Error('HTTP status ' + res.status);
                const htmlText = await res.text();
                
                document.getElementById('terminal-content').innerHTML = htmlText;
            } catch (err) {
                console.error(err);
                const path = window.location.pathname;
                const isTeamPage = path.startsWith('/mlb/team/');
                const isComparePage = path.startsWith('/mlb/compare');
                const retryMsg = (isTeamPage || isComparePage) ? '' : '\nRetrying in 10s...';
                document.getElementById('terminal-content').innerHTML = 
                    '<span class="term-red">ERROR CONNECTING TO STREAM: ' + err.message + '</span>' + retryMsg;
            }
        }

        // ---- Tennis live point-by-point score (client-side, Vercel-safe) ----
        // Vercel serverless functions often cannot reach TennisLive.net (Cloudflare),
        // so the point score is fetched from the user's browser through a CORS
        // proxy and overlaid onto the rendered match page. Degrades silently.
        const TENNISLIVE_PROXY = 'https://api.allorigins.win/raw?url=';

        function parseTennisLivePoint(htmlStr) {
            const re = /class="mp_info_txt">([^<]*)<\/td>[\s\S]*?class="mp_15">([^<]*)<\/td>/g;
            let m, last = null;
            while ((m = re.exec(htmlStr)) !== null) last = m;
            if (!last) return null;
            const gameScore = last[1].replace(/<[^>]*>/g, '').trim();
            const prog = last[2].replace(/<[^>]*>/g, '').trim();
            const tokens = prog.split(',').map(s => s.trim()).filter(s => s);
            let cur = tokens.length ? tokens[tokens.length - 1] : '';
            const bp = cur.includes('[BP]');
            cur = cur.replace(/\[BP\]/g, '').trim();
            let display = cur;
            if (cur === '40-40') display = '40-40 (Deuce)';
            else if (cur === 'A-40') display = 'Ad (Server)';
            else if (cur === '40-A') display = 'Ad (Returner)';
            // server = mp_serve cell with an <img> in the same <tr> as the last info_txt
            const infoIdx = htmlStr.indexOf(last[1]);
            const trStart = htmlStr.lastIndexOf('<tr', infoIdx);
            const rowEnd = htmlStr.indexOf('</tr>', infoIdx);
            let server = '';
            if (trStart >= 0 && rowEnd > trStart) {
                const row = htmlStr.substring(trStart, rowEnd);
                const srv = /class="mp_serve">([^<]*?)(<img[^>]*>)?<\/td>/g;
                let sm;
                while ((sm = srv.exec(row)) !== null) {
                    if (sm[2]) server = sm[1].replace(/<[^>]*>/g, '').trim();
                }
            }
            return { gameScore, display, cur, bp, server };
        }

        function buildLivePointBlock(pt) {
            let pointLine = pt.display;
            if (pt.bp) pointLine += '  [BREAK POINT]';
            const lines = [
                '------------------------------------------------------------------------',
                ' LIVE GAME SCORE  (point-by-point · TennisLive)',
                '------------------------------------------------------------------------',
                ' CURRENT GAME: ' + pt.gameScore,
                ' POINTS      : ' + pointLine,
            ];
            if (pt.server) lines.push(' SERVER      : ★ ' + pt.server);
            lines.push('------------------------------------------------------------------------');
            const pre = document.createElement('pre');
            pre.className = 'term-art tennislive-points';
            pre.textContent = lines.join('\n');
            return pre;
        }

        async function fetchTennisLivePoints() {
            try {
                if (!window.location.pathname.startsWith('/tennis/game/')) return;
                const res = await fetch(window.location.pathname + '?raw=1', { cache: 'no-store' });
                if (!res.ok) return;
                const txt = await res.text();
                // only attach for in-progress matches
                if (!/\[IN\]/.test(txt)) return;
                // Extract the two player full names from the title line
                const titleMatch = txt.match(/\[IN\]\s+([^-]+?)\s+vs\s+([^-]+?)\s+\(ATP|WTA\)/);
                if (!titleMatch) return;
                const p1 = titleMatch[1].trim();
                const p2 = titleMatch[2].trim();
                const tour = titleMatch[0].includes('(ATP)') ? 'atp' : 'wta';
                // Build a TennisLive search URL by slugifying names + guessing the listing
                // Simpler: scrape the TennisLive homepage listing to find the detail URL.
                const listingUrl = TENNISLIVE_PROXY + encodeURIComponent('https://www.tennislive.net/');
                const lr = await fetch(listingUrl, { cache: 'no-store' });
                if (!lr.ok) return;
                const lh = await lr.text();
                const linkRe = /<a href="(https:\/\/www\.tennislive\.net\/(atp|wta)\/match\/[^"]+)"[^>]*class="nu-reward"/g;
                const matchRe = /class="match "><a href="https:\/\/www\.tennislive\.net\/(?:atp|wta)\/[^"]+"[^>]*>([^<]+)<\/a>/g;
                let lm, detailUrl = null;
                const links = [];
                while ((lm = linkRe.exec(lh)) !== null) links.push(lm);
                for (const l of links) {
                    const url = l[1]; const t = l[2];
                    const pos = lh.indexOf(url);
                    const before = [];
                    let mm; matchRe.lastIndex = 0;
                    while ((mm = matchRe.exec(lh.substring(0, pos))) !== null) before.push(mm[1]);
                    matchRe.lastIndex = 0;
                    let after = null; const am = matchRe.exec(lh.substring(pos));
                    if (am) after = am[1];
                    const a = before.length ? before[before.length - 1] : '';
                    const b = after || '';
                    const sur = n => (n.toLowerCase().replace(/[^a-z0-9\/ ]/g, '').split(/[\/ ]/).filter(Boolean).pop());
                    const keyA = [sur(a), sur(b)].sort().join('|');
                    const keyB = [sur(p1), sur(p2)].sort().join('|');
                    if (t === tour && keyA === keyB) { detailUrl = url; break; }
                }
                if (!detailUrl) return;
                const dr = await fetch(TENNISLIVE_PROXY + encodeURIComponent(detailUrl), { cache: 'no-store' });
                if (!dr.ok) return;
                const dh = await dr.text();
                const pt = parseTennisLivePoint(dh);
                if (!pt) return;
                // remove any existing overlay
                const existing = document.querySelector('.tennislive-points');
                if (existing) existing.remove();
                const block = buildLivePointBlock(pt);
                const content = document.getElementById('terminal-content');
                // insert after the first <pre class="term-art"> that contains the set table (the one with PLAYER header)
                const pres = content.querySelectorAll('pre.term-art');
                let inserted = false;
                for (const p of pres) {
                    if (/PLAYER/.test(p.textContent)) {
                        p.insertAdjacentElement('afterend', block);
                        inserted = true;
                        break;
                    }
                }
                if (!inserted) content.appendChild(block);
            } catch (e) {
                // silent: point score is a best-effort enhancement
            }
        }

        // Initial fetch
        fetchTerminalData().then(fetchTennisLivePoints);
        updatePolling();
        // also refresh points on each poll tick
        const _origFetch = fetchTerminalData;
        fetchTerminalData = async function () {
            await _origFetch();
            fetchTennisLivePoints();
        };

        // Handle navigation inside terminal via AJAX
        document.addEventListener('click', async (e) => {
            if (e.target.classList.contains('term-link')) {
                e.preventDefault();
                const href = e.target.getAttribute('href');
                history.pushState(null, '', href);
                updateStatus(); // Immediate layout update
                updatePolling();
                document.getElementById('terminal-content').innerHTML = 'RETRIEVING FEED...';
                await fetchTerminalData();
            }
        });

        // Listen for back button
        window.addEventListener('popstate', () => {
            updateStatus();
            updatePolling();
            fetchTerminalData();
        });
    </script>
</body>
</html>
